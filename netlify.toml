[build]
  publish = "."

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/web-pos"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/web-pos/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/catalog"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/catalog/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
